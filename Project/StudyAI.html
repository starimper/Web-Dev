<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI – ARIA Engine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090f;--s1:#0d1117;--s2:#131b24;--s3:#1c2639;--border:rgba(56,189,248,.12);--acc:#38bdf8;--acc2:#a78bfa;--green:#34d399;--amber:#fbbf24;--red:#f87171;--txt:#e2e8f0;--mut:#64748b}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(56,189,248,.2);border-radius:99px}
#app{min-height:100vh}
.sidebar{position:fixed;left:0;top:0;height:100vh;width:228px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}

h1{font-size:26px;font-weight:700;margin-bottom:4px}h2{font-size:20px;font-weight:700;margin-bottom:12px}h3{font-size:16px;font-weight:600;margin-bottom:10px}
.card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;transition:all .2s}
.btn-p{background:linear-gradient(135deg,#38bdf8,#a78bfa);color:#fff}.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-g{background:transparent;color:var(--txt);border:1px solid var(--border)}.btn-g:hover{background:var(--s2);border-color:var(--acc)}
.btn-d{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}.btn-d:hover{background:rgba(248,113,113,.2)}

.inp:focus{border-color:var(--acc)}.inp::placeholder{color:var(--mut)}
select.inp option{background:var(--s1)}textarea.inp{resize:vertical;min-height:70px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 14px;margin:2px 8px;border-radius:8px;cursor:pointer;color:var(--mut);font-size:14px;font-weight:500;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{background:var(--s2);color:var(--txt)}.nav-item.active{background:rgba(56,189,248,.08);color:var(--acc);border-left-color:var(--acc)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:12px;font-weight:600}
.bh{background:rgba(248,113,113,.15);color:var(--red)}.bm{background:rgba(251,191,36,.15);color:var(--amber)}.bl{background:rgba(52,211,153,.15);color:var(--green)}.bi{background:rgba(56,189,248,.12);color:var(--acc)}
.pb{height:6px;background:var(--s3);border-radius:99px;overflow:hidden}.pf{height:100%;border-radius:99px;transition:width .5s}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:fu .25s ease}

.mu{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.15);border-radius:12px 12px 2px 12px;padding:11px 15px;margin-left:48px;font-size:14px;line-height:1.6}
.ma{background:var(--s2);border:1px solid var(--border);border-radius:12px 12px 12px 2px;padding:11px 15px;margin-right:48px;font-size:14px;line-height:1.7}
.mah{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.aa{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#34d399,#38bdf8);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;color:#fff}
.sc{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.gt2{background:linear-gradient(135deg,#34d399,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.fb{display:flex;align-items:center}.fbb{display:flex;align-items:center;justify-content:space-between}
.xb{margin-top:10px;padding:10px 13px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:8px;font-size:12px;color:var(--green)}
.xb strong{display:block;margin-bottom:3px;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.wg{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.wdh{padding:10px 6px;text-align:center;border-right:1px solid var(--border);background:var(--s1)}.wdh:last-child{border-right:none}
.wdb{min-height:90px;padding:5px;border-right:1px solid var(--border);border-top:1px solid var(--border);background:var(--s2)}.wdb:last-child{border-right:none}
.we{padding:3px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sm2{height:8px;border-radius:99px;background:var(--s3);overflow:hidden}.sf{height:100%;border-radius:99px;transition:width .6s}
.tog{width:42px;height:22px;border-radius:99px;background:var(--s3);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--acc)}.togt{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:99px;background:#fff;transition:left .2s}.tog.on .togt{left:22px}
.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.td{width:6px;height:6px;border-radius:99px;background:var(--green);display:inline-block;animation:tdot 1.2s ease infinite}
@keyframes tdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.chip{display:inline-flex;align-items:center;padding:4px 11px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--mut);cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.chip:hover{border-color:var(--acc);color:var(--acc)}

.sess-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--s1);margin-bottom:6px;transition:background .2s}
.sess-row:hover{background:var(--s3)}
.sess-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.sess-check.done{background:var(--green);border-color:var(--green)}
.sess-bar{height:4px;border-radius:99px;background:var(--s3);overflow:hidden;flex:1}
.sess-fill{height:100%;border-radius:99px}
.today-sess{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:10px;padding:14px}
.today-sess-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;background:var(--s2);margin-bottom:8px;border:1px solid var(--border)}
.today-sess-item.done-item{opacity:.55}
.gen-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:16px}.g2,.g3,.g4{grid-template-columns:1fr}}
</style>

<body><div id="app"></div>
<script>



const DB_NAME='studyai',DB_VER=2;
let _idb=null;

function openDB(){
  return new Promise((res,rej)=>{
    if(_idb){res(_idb);return;}
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('users')) db.createObjectStore('users',{keyPath:'id'});
      if(!db.objectStoreNames.contains('tasks')){const s=db.createObjectStore('tasks',{keyPath:'id'});s.createIndex('userId','userId',{unique:false});}
      if(!db.objectStoreNames.contains('sessions')){const s=db.createObjectStore('sessions',{keyPath:'id'});s.createIndex('taskId','taskId',{unique:false});s.createIndex('userId','userId',{unique:false});s.createIndex('date','date',{unique:false});}
      if(!db.objectStoreNames.contains('events')){const s=db.createObjectStore('events',{keyPath:'id'});s.createIndex('userId','userId',{unique:false});}
      if(!db.objectStoreNames.contains('messages')){const s=db.createObjectStore('messages',{keyPath:'id'});s.createIndex('userId','userId',{unique:false});}
    };
    req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    req.onerror=()=>rej(req.error);
  });
}

async function dbGet(store,key){try{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).get(key);req.onsuccess=()=>res(req.result||null);req.onerror=()=>rej(req.error);});}catch{return lsGet(store+'_'+key);}}
async function dbPut(store,obj){try{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const req=tx.objectStore(store).put(obj);req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);});}catch{lsPut(store+'_'+obj.id,obj);}}
async function dbDel(store,key){try{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const req=tx.objectStore(store).delete(key);req.onsuccess=()=>res();req.onerror=()=>rej(req.error);});}catch{lsDel(store+'_'+key);}}
async function dbGetByIndex(store,idx,val){try{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).index(idx).getAll(val);req.onsuccess=()=>res(req.result||[]);req.onerror=()=>rej(req.error);});}catch{return lsGetByPrefix(store+'_',idx,val);}}
async function dbGetAll(store){try{const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const req=tx.objectStore(store).getAll();req.onsuccess=()=>res(req.result||[]);req.onerror=()=>rej(req.error);});}catch{return [];}}
async function dbPutMany(store,items){for(const item of items)await dbPut(store,item);}
async function dbDelMany(store,idx,val){const items=await dbGetByIndex(store,idx,val);for(const item of items)await dbDel(store,item.id);}


const lsGet=(k,d=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}};
const lsPut=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const lsDel=(k)=>{try{localStorage.removeItem(k);}catch{}};
function lsGetByPrefix(prefix,idx,val){const res=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(prefix)){try{const v=JSON.parse(localStorage.getItem(k));if(v&&v[idx]===val)res.push(v);}catch{}}}return res;}


const Auth={
  iterations:210000,
  enc:new TextEncoder(),
  b64:bytes=>btoa(String.fromCharCode(...bytes)),
  unb64:str=>Uint8Array.from(atob(str),c=>c.charCodeAt(0)),
  requireCrypto(){if(!window.crypto?.subtle)throw new Error('Secure password hashing is unavailable in this browser.');},
  async hashPassword(password){
    Auth.requireCrypto();
    const salt=crypto.getRandomValues(new Uint8Array(16));
    const key=await crypto.subtle.importKey('raw',Auth.enc.encode(password),'PBKDF2',false,['deriveBits']);
    const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:Auth.iterations,hash:'SHA-256'},key,256);
    return `pbkdf2-sha256$${Auth.iterations}$${Auth.b64(salt)}$${Auth.b64(new Uint8Array(bits))}`;
  },
  async verifyPassword(password,storedHash){
    Auth.requireCrypto();
    try{
      const parts=(storedHash||'').split('$');
      if(parts.length!==4||parts[0]!=='pbkdf2-sha256')return false;
      const iterations=parseInt(parts[1],10);
      if(!Number.isFinite(iterations)||iterations<100000)return false;
      const salt=Auth.unb64(parts[2]),expected=Auth.unb64(parts[3]);
      const key=await crypto.subtle.importKey('raw',Auth.enc.encode(password),'PBKDF2',false,['deriveBits']);
      const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations,hash:'SHA-256'},key,expected.length*8);
      const actual=new Uint8Array(bits);
      if(actual.length!==expected.length)return false;
      let diff=0;for(let i=0;i<actual.length;i++)diff|=actual[i]^expected[i];
      return diff===0;
    }catch{return false;}
  },
  stripPlainPassword(user){
    if(!user)return user;
    const clean={...user};
    if(clean.passwordHash)delete clean.password;
    return clean;
  },
  async userWithPasswordHash(user,password){
    const clean={...user,passwordHash:await Auth.hashPassword(password),passwordChangedAt:Date.now()};
    delete clean.password;
    return clean;
  },
  async authenticate(user,password){
    if(!user)return null;
    if(user.passwordHash)return await Auth.verifyPassword(password,user.passwordHash)?Auth.stripPlainPassword(user):null;
    if(typeof user.password==='string'&&user.password===password)return await Auth.userWithPasswordHash(user,password);
    return null;
  }
};


const DB={
  
  getUser:id=>dbGet('users',id),
  saveUser:user=>dbPut('users',user),
  getUsers:()=>dbGetAll('users'),
  getUserByEmail:async email=>(await dbGetAll('users')).find(u=>u.email===email)||null,
  
  getTasksByUser:uid=>dbGetByIndex('tasks','userId',uid),
  saveTask:task=>dbPut('tasks',task),
  deleteTask:id=>dbDel('tasks',id),
  getTask:id=>dbGet('tasks',id),
  
  getSessionsByUser:uid=>dbGetByIndex('sessions','userId',uid),
  getSessionsByTask:tid=>dbGetByIndex('sessions','taskId',tid),
  getSessionsByDate:(uid,date)=>dbGetByIndex('sessions','date',date).then(ss=>ss.filter(s=>s.userId===uid)),
  saveSession:s=>dbPut('sessions',s),
  saveSessions:ss=>dbPutMany('sessions',ss),
  deleteSessionsByTask:tid=>dbDelMany('sessions','taskId',tid),
  updateSession:(id,updates)=>dbGet('sessions',id).then(s=>{if(s)return dbPut('sessions',{...s,...updates});}),
  
  getEventsByUser:uid=>dbGetByIndex('events','userId',uid),
  saveEvent:e=>dbPut('events',e),
  deleteEvent:id=>dbDel('events',id),
  
  getMsgsByUser:uid=>dbGetByIndex('messages','userId',uid),
  saveMsg:m=>dbPut('messages',m),
  clearMsgs:async uid=>{const ms=await dbGetByIndex('messages','userId',uid);for(const m of ms)await dbDel('messages',m.id);},
};


const Users={
  getAll:()=>lsGet('users',[]),
  find:email=>Users.getAll().find(u=>u.email===email),
  findById:id=>Users.getAll().find(u=>u.id===id),
  save:user=>{const safe=Auth.stripPlainPassword(user);const all=Users.getAll().map(Auth.stripPlainPassword);const idx=all.findIndex(u=>u.id===safe.id);if(idx>=0)all[idx]=safe;else all.push(safe);lsPut('users',all);lsPut('cu',safe);DB.saveUser(safe).catch(()=>{});},
  getCurrent:()=>lsGet('cu'),
  setCurrent:user=>lsPut('cu',Auth.stripPlainPassword(user)),
  clearCurrent:()=>lsDel('cu'),
};

async function migrateStoredPasswords(){
  const all=Users.getAll();
  const migrated=[];
  let changed=false;
  for(const user of all){
    if(user?.password){
      migrated.push(await Auth.userWithPasswordHash(user,user.password));changed=true;
    }else{
      const clean=Auth.stripPlainPassword(user);migrated.push(clean);changed=changed||clean!==user;
    }
  }
  if(changed)lsPut('users',migrated);

  const idbUsers=await DB.getUsers().catch(()=>[]);
  for(const user of idbUsers){
    if(user?.password)await DB.saveUser(await Auth.userWithPasswordHash(user,user.password));
    else if(user?.passwordHash)await DB.saveUser(Auth.stripPlainPassword(user));
  }

  const current=Users.getCurrent();
  if(!current)return null;
  let clean=migrated.find(u=>u.id===current.id)||current;
  if(clean.password)clean=await Auth.userWithPasswordHash(clean,clean.password);
  else clean=Auth.stripPlainPassword(clean);
  if(!migrated.some(u=>u.id===clean.id)){migrated.push(clean);lsPut('users',migrated);}
  Users.setCurrent(clean);
  return clean;
}




const SessionGen={
  
  generate(task){
    if(!task.deadline||!task.estimatedTime)return[];
    const now=new Date();now.setHours(0,0,0,0);
    const deadline=new Date(task.deadline);deadline.setHours(0,0,0,0);
    const totalHours=parseFloat(task.estimatedTime)||0;
    if(totalHours<=0)return[];
    const daysAvail=Math.max(1,Math.ceil((deadline-now)/86400000)+1); 
    const hoursPerDay=Math.round((totalHours/daysAvail)*10)/10;
    
    let daysToUse=daysAvail;
    let hpd=hoursPerDay;
    if(hpd<0.5&&daysAvail>1){
      
      daysToUse=Math.max(1,Math.floor(totalHours/0.5));
      hpd=Math.round((totalHours/daysToUse)*10)/10;
    }
    if(hpd>4){
      
      
      hpd=Math.round(hpd*10)/10;
    }
    const sessions=[];
    
    const startOffset=daysAvail-daysToUse;
    for(let i=0;i<daysToUse;i++){
      const d=new Date(now);d.setDate(now.getDate()+startOffset+i);
      const isOverdue=d<now;
      sessions.push({
        id:uid(),taskId:task.id,userId:task.userId||'',
        date:d.toISOString().split('T')[0],
        duration:hpd,status:'pending',
        dayNum:i+1,totalDays:daysToUse,
        taskTitle:task.title,taskCourse:task.course||'',
        createdAt:Date.now()
      });
    }
    return sessions;
  },
  
  describe(task){
    if(!task.deadline||!task.estimatedTime)return null;
    const now=new Date();now.setHours(0,0,0,0);
    const deadline=new Date(task.deadline);deadline.setHours(0,0,0,0);
    const totalHours=parseFloat(task.estimatedTime)||0;
    const daysAvail=Math.max(1,Math.ceil((deadline-now)/86400000)+1);
    const daysToUse=totalHours<0.5*daysAvail?Math.max(1,Math.floor(totalHours/0.5)):daysAvail;
    const hpd=Math.round((totalHours/daysToUse)*10)/10;
    return{totalHours,daysAvail,daysToUse,hpd};
  }
};




let S={
  page:Users.getCurrent()?'dashboard':'landing',
  user:Users.getCurrent(),
  landTab:'features',archTab:'usecase',
  taskFilter:'all',taskSort:'score',
  tasks:[],sessions:[],events:[],msgs:[],
  loading:false,weekOff:0,modal:null,
  stressRes:null,saved:false,
  expandedTask:null, 
  todaySessions:[], 
};

async function loadData(){
  if(!S.user)return;
  const uid=S.user.id;
  [S.tasks,S.sessions,S.events,S.msgs]=await Promise.all([
    DB.getTasksByUser(uid),
    DB.getSessionsByUser(uid),
    DB.getEventsByUser(uid),
    DB.getMsgsByUser(uid),
  ]);
  S.tasks.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  S.sessions.sort((a,b)=>a.date.localeCompare(b.date)||(a.dayNum-b.dayNum));
  S.msgs.sort((a,b)=>(a.ts||0)-(b.ts||0));
  if(!S.msgs.length){
    const m={id:uid2(),role:'assistant',intent:'GREETING',content:ARIA.greet(S.user.name,S.tasks,S.sessions),userId:uid,ts:Date.now()};
    await DB.saveMsg(m);S.msgs=[m];
  }
  updateTodaySessions();
}
function updateTodaySessions(){
  const today=new Date().toISOString().split('T')[0];
  S.todaySessions=S.sessions.filter(s=>s.date===today);
}
async function saveTask(task){
  await DB.saveTask(task);
  
  await DB.deleteSessionsByTask(task.id);
  if(task.status!=='done'){
    const newSess=SessionGen.generate(task);
    
    const oldSess=S.sessions.filter(s=>s.taskId===task.id);
    const doneByDay={};oldSess.forEach(s=>{if(s.status==='done')doneByDay[s.date]=true;});
    newSess.forEach(s=>{if(doneByDay[s.date])s.status='done';});
    await DB.saveSessions(newSess);
  }
  
  await loadData();
}
async function deleteTask(id){
  await DB.deleteTask(id);
  await DB.deleteSessionsByTask(id);
  await loadData();
}
async function toggleSession(sessId){
  const s=S.sessions.find(x=>x.id===sessId);
  if(!s)return;
  await DB.updateSession(sessId,{status:s.status==='done'?'pending':'done'});
  await loadData();render();
}

const uid=()=>Math.random().toString(36).slice(2,10);
const uid2=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fd(d){if(!d)return'N/A';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function dl(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000)}
const pc=p=>({high:'bh',medium:'bm',low:'bl'}[p]||'bl');
const pl=p=>({high:'High',medium:'Medium',low:'Low'}[p]||p);
function md(t){
  return esc(t)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:var(--s3);padding:1px 6px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/^### (.*?)$/gm,'<strong style="font-size:14px;display:block;margin:8px 0 3px;color:var(--acc)">$1</strong>')
    .replace(/^## (.*?)$/gm,'<strong style="font-size:15px;display:block;margin:10px 0 4px">$1</strong>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">')
    .replace(/^[•\-] (.*?)$/gm,'<div style="display:flex;gap:8px;margin:3px 0"><span style="color:var(--green);flex-shrink:0">•</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.*?)$/gm,'<div style="display:flex;gap:8px;margin:3px 0"><span style="color:var(--acc);font-weight:700;min-width:16px;flex-shrink:0">$1.</span><span>$2</span></div>')
    .replace(/\n/g,'<br>');
}

// Render engine
function render(){
  const app=document.getElementById('app');if(!app)return;
  if(S.page==='landing'){app.innerHTML=renderLanding();aLanding();}
  else if(S.page==='login'||S.page==='register'){app.innerHTML=renderAuth();aAuth();}
  else if(S.user){app.innerHTML=renderLayout(renderPage());aLayout();aPage();}
  else{S.page='landing';render();}
  if(S.modal)renderModal();
}

//  ARIA ENGINE — Custom AI
// ═══════════════════════════════════════════════════
const ARIA=(function(){
  function scoreTask(t){
    const d=dl(t.deadline);
    let u=d===null?10:d<0?100:d===0?95:d===1?85:d<=3?70:d<=7?50:d<=14?30:15;
    const pw={high:40,medium:22,low:8}[t.priority]||0;
    const sb=t.status==='in_progress'?12:0;
    return Math.min(100,Math.round(u*0.55+pw*0.75+sb*0.15));
  }
  function detectStress(tasks,sessions){
    const now=new Date();
    const overdue=tasks.filter(t=>t.deadline&&new Date(t.deadline)<now&&t.status!=='done').length;
    const in48h=tasks.filter(t=>{if(!t.deadline||t.status==='done')return false;const h=(new Date(t.deadline)-Date.now())/3600000;return h>=0&&h<=48;}).length;
    const high=tasks.filter(t=>t.priority==='high'&&t.status!=='done').length;
    // Session overload: if today has >4 hours of pending sessions
    const today=now.toISOString().split('T')[0];
    const todayH=(sessions||[]).filter(s=>s.date===today&&s.status!=='done').reduce((a,s)=>a+(s.duration||0),0);
    const isHigh=overdue>=2||in48h>=3||high>=4||todayH>4;
    const score=Math.min(100,overdue*20+in48h*15+high*10+(todayH>4?15:0));
    return{isHigh,score,overdue,in48h,high,todayH};
  }
  const INTENTS={
    GREETING:[/^(hi|hello|hey|good\s*(morning|evening|afternoon)|what.s up|yo\b)/i],
    ABOUT:[/who are you|what are you|about aria|your capabilities|what can you do|how do you work/i],
    PRIORITIZE:[/prioriti[sz]|what.*first|most important|what.*focus|where.*start|what.*urgent|top task|rank/i],
    PLAN_TODAY:[/today.s plan|plan.*today|what.*today|today.*schedule|what should i do today|sessions.*today/i],
    PLAN_WEEK:[/week.*plan|plan.*week|weekly.*schedule|this week/i],
    STRESS:[/stress|overwhelm|burnout|too much|anxious|anxiety|can.t handle|falling behind/i],
    DEADLINES:[/deadline|due\s*soon|upcoming|what.*due|due date/i],
    TASK_STATUS:[/how many task|task.*status|my task|progress|overview|summary/i],
    SESSIONS:[/session|study session|how.*divided|split.*task|daily.*plan|hours.*day/i],
    MOTIVATION:[/motivat|procrastinat|lazy|can.t focus|can.t start|no.*energy|stuck/i],
    STUDY_TIPS:[/how.*study|study.*technique|memoriz|remember.*better|learn faster|concentrate/i],
    POMODORO:[/pomodoro|25.*min|work.*break|timer|focus.*session/i],
    TIME_ESTIMATE:[/how long|time.*need|estimate|hours.*finish|when.*done/i],
    TIPS_EXAM:[/exam.*tip|prepare.*exam|exam.*prep|before.*exam|night before/i],
  };
  function classify(text){for(const[i,p]of Object.entries(INTENTS)){for(const r of p)if(r.test(text))return i;}return'FALLBACK';}
  function greet(name,tasks,sessions){
    const first=name.split(' ')[0];
    const pending=tasks.filter(t=>t.status!=='done').length;
    const today=new Date().toISOString().split('T')[0];
    const todaySess=(sessions||[]).filter(s=>s.date===today);
    const doneSess=todaySess.filter(s=>s.status==='done').length;
    const st=detectStress(tasks,sessions);
    return`## Hi ${first}! I'm ARIA 👋\n**A**cademic **R**esource & **I**ntelligence **A**ssistant — custom-built with smart task splitting.\n\n**Today:** ${todaySess.length} study session${todaySess.length!==1?'s':''} scheduled${todaySess.length?` (${doneSess} done, ${todaySess.length-doneSess} remaining)`:''}\n**Pending tasks:** ${pending} · ${st.isHigh?'⚠️ High stress detected':'✅ Workload manageable'}\n\n**What I can do:**\n- **"Plan today"** — shows your actual scheduled sessions from the DB\n- **"Prioritize my tasks"** — ARIA scoring formula\n- **"Show my sessions"** — all scheduled study sessions\n- **"Am I stressed?"** — Lab 4 classifier\n- **"Study tips"**, **"Motivate me"**, **"Exam prep tips"**\n\nWhat would you like help with?`;
  }
  function handle(intent,text,tasks,sessions,name){
    const first=name.split(' ')[0];
    if(intent==='GREETING')return{content:greet(name,tasks,sessions),intent,xai:null};
    if(intent==='ABOUT')return{content:`## About ARIA\n\nCustom AI built for this project at KBTU.\n\n**Core systems:**\n- **Smart Session Generator** — splits tasks into daily work sessions stored in IndexedDB\n- **Intent Classifier** — 14 NLP categories\n- **Priority Scorer** — urgency×0.55 + priority×0.30 + status×0.15\n- **Stress Detector** — Lab 4 rule classifier (F1=0.762)\n- **Session-aware planning** — "Plan today" reads actual DB sessions\n- **XAI** — every response explains its reasoning\n- **Groq fallback** — free Llama-3 for open questions`,intent,xai:null};
    if(intent==='SESSIONS'){
      const pending=tasks.filter(t=>t.status!=='done');
      const withSess=pending.filter(t=>sessions.some(s=>s.taskId===t.id));
      if(!withSess.length)return{content:`No sessions generated yet. **Add tasks with both a deadline and estimated hours** — ARIA will automatically split them into daily sessions.\n\nExample: Task "Write report", deadline in 6 days, 6 hours estimated → **1 hour/day for 6 days**.`,intent,xai:null};
      let out=`## Your Study Sessions\n\n`;
      withSess.forEach(t=>{
        const tSess=sessions.filter(s=>s.taskId===t.id&&s.status!=='done');
        const done=sessions.filter(s=>s.taskId===t.id&&s.status==='done').length;
        const total=sessions.filter(s=>s.taskId===t.id).length;
        out+=`**${t.title}**${t.course?' ('+t.course+')':''} · ${done}/${total} sessions done\n`;
        tSess.slice(0,3).forEach(s=>out+=`  - ${s.date}: ${s.duration}h\n`);
        if(tSess.length>3)out+=`  - ...and ${tSess.length-3} more\n`;
        out+='\n';
      });
      return{content:out,intent,xai:`Sessions are generated by the Smart Session Generator when you create a task with deadline + estimated hours. Formula: hours_per_day = total_hours / days_available.`};
    }
    if(intent==='PLAN_TODAY'){
      const today=new Date().toISOString().split('T')[0];
      const todaySess=sessions.filter(s=>s.date===today);
      const pending=todaySess.filter(s=>s.status!=='done');
      const done=todaySess.filter(s=>s.status==='done');
      if(!todaySess.length){
        // Fallback to ARIA-generated plan
        const ptasks=tasks.filter(t=>t.status!=='done');
        if(!ptasks.length)return{content:`No tasks or sessions for today. You're all clear! 🎉`,intent,xai:null};
        const scored=ptasks.map(t=>({...t,s:scoreTask(t)})).sort((a,b)=>b.s-a.s);
        let out=`## Today's ARIA Plan\n\n*No scheduled sessions from DB — generating based on priority:*\n\n`;
        let hr=8;
        scored.slice(0,4).forEach((t,i)=>{
          const est=parseFloat(t.estimatedTime)||1.5;
          const fh=h=>{const hrs=Math.floor(h),m=Math.round((h-hrs)*60),ap=hrs<12?'AM':'PM',d=hrs>12?hrs-12:hrs===0?12:hrs;return`${d}:${m.toString().padStart(2,'0')} ${ap}`;};
          out+=`📚 **${fh(hr)}–${fh(hr+est)}** · ${t.title}\n${t.course?'Course: '+t.course+' · ':''}${est}h · Score: ${t.s}/100\n\n`;
          hr+=est+0.5;
        });
        return{content:out,intent,xai:`No DB sessions found for today. Showing ARIA's priority-based plan instead. Add tasks with deadlines + estimated hours to get auto-scheduled sessions.`};
      }
      let out=`## Today's Study Sessions\n\nFrom your scheduled plan (IndexedDB):\n\n`;
      if(done.length)out+=`✅ **Completed:** ${done.map(s=>s.taskTitle).join(', ')}\n\n`;
      if(pending.length){
        out+=`📚 **Remaining today:**\n`;
        pending.forEach(s=>{out+=`- **${s.taskTitle}** — ${s.duration}h${s.taskCourse?' ('+s.taskCourse+')':''} · Session ${s.dayNum}/${s.totalDays}\n`;});
        const totalLeft=pending.reduce((a,s)=>a+(s.duration||0),0);
        out+=`\n**Total remaining: ${totalLeft}h**\n\n`;
        out+=`💡 Work in 25-min blocks. Check off sessions in the Tasks or Dashboard page.`;
      }else out+=`🎉 **All sessions done for today!** Great work, ${first}.`;
      return{content:out,intent,xai:`Sessions retrieved from IndexedDB. Generated by Smart Session Generator when you created tasks with deadline + estimated hours.`};
    }
    if(intent==='PRIORITIZE'){
      const pending=tasks.filter(t=>t.status!=='done');
      if(!pending.length)return{content:`No pending tasks! Add tasks on the Tasks page.`,intent,xai:null};
      const scored=pending.map(t=>({...t,sc:scoreTask(t)})).sort((a,b)=>b.sc-a.sc).slice(0,5);
      let out=`## Prioritized Tasks\n\nFormula: urgency×0.55 + priority_weight×0.30 + status×0.15\n\n`;
      scored.forEach((t,i)=>{
        const d=dl(t.deadline);
        const bar='█'.repeat(Math.round(t.sc/10))+'░'.repeat(10-Math.round(t.sc/10));
        const dStr=d===null?'no deadline':d<0?`⚠️ ${Math.abs(d)}d overdue`:d===0?'🔴 TODAY':d===1?'🟠 tomorrow':`🟡 ${d}d left`;
        const sess=sessions.filter(s=>s.taskId===t.id&&s.status!=='done').length;
        out+=`**${i+1}. ${t.title}**\nScore: ${t.sc}/100 \`${bar}\`\n${dStr}${t.course?' · '+t.course:''}${sess>0?` · ${sess} sessions left`:''}${t.estimatedTime?` · ${t.estimatedTime}h total`:''}\n\n`;
      });
      return{content:out,intent,xai:`Score = urgency(0–100 by days, 55%) + priority weight (High=40,Med=22,Low=8, 30%) + in-progress bonus (12pts, 15%). Based on Lab 3: deadline urgency is top stress driver (mean=3.9).`};
    }
    if(intent==='PLAN_WEEK'){
      const days=['Monday','Tuesday','Wednesday','Thursday','Friday'];
      const week={Monday:[],Tuesday:[],Wednesday:[],Thursday:[],Friday:[]};
      const now=new Date();now.setHours(0,0,0,0);
      // Group sessions by day of week for the next 7 days
      let hasSessions=false;
      for(let i=0;i<7;i++){
        const d=new Date(now);d.setDate(now.getDate()+i);
        const ds=d.toISOString().split('T')[0];
        const dayName=d.toLocaleDateString('en-US',{weekday:'long'});
        if(days.includes(dayName)){
          const daySess=sessions.filter(s=>s.date===ds&&s.status!=='done');
          if(daySess.length){week[dayName].push(...daySess);hasSessions=true;}
        }
      }
      if(!hasSessions){
        return{content:`No sessions scheduled for this week yet.\n\n**To get a weekly plan:** Add tasks with both a **deadline** and **estimated hours** — ARIA will automatically create daily sessions stored in the database.\n\nExample: "Write essay" · Deadline: Friday · 4 hours → **1 hour/day Mon–Thu**.`,intent,xai:null};
      }
      let out=`## Your Week at a Glance\n\nSessions from the database:\n\n`;
      days.forEach(day=>{
        if(!week[day].length)return;
        const totalH=week[day].reduce((a,s)=>a+(s.duration||0),0);
        out+=`**${day}** (${totalH}h total)\n`;
        week[day].forEach(s=>out+=`- ${s.taskTitle}: ${s.duration}h\n`);
        out+='\n';
      });
      const totalWeekH=Object.values(week).flat().reduce((a,s)=>a+(s.duration||0),0);
      out+=`---\n📊 **Total this week: ${totalWeekH}h** across ${Object.values(week).flat().length} sessions`;
      return{content:out,intent,xai:`Sessions pulled from IndexedDB, grouped by weekday. Sessions generated automatically when you add tasks with deadline + hours.`};
    }
    if(intent==='STRESS'){
      const st=detectStress(tasks,sessions);
      let out=st.isHigh?`## ⚠️ Stress Analysis — HIGH\n\n`:`## ✅ Stress Analysis — Manageable\n\n`;
      out+=`- Overdue tasks: **${st.overdue}** ${st.overdue>=2?'⚠️':'✅'}\n`;
      out+=`- Due in 48h: **${st.in48h}** ${st.in48h>=3?'⚠️':'✅'}\n`;
      out+=`- High-priority active: **${st.high}** ${st.high>=4?'⚠️':'✅'}\n`;
      out+=`- Today's session load: **${st.todayH}h** ${st.todayH>4?'⚠️ (>4h is heavy)':'✅'}\n`;
      out+=`- Score: **${st.score}/100**\n\n`;
      if(st.isHigh)out+=`**Actions:**\n1. Check today's sessions in the Dashboard\n2. If overloaded, reschedule low-priority sessions\n3. Pomodoro: 25min focus → 5min break\n4. Ask: "Plan today" for your actual session list`;
      return{content:out,intent,xai:`Lab 4 classifier rules: HIGH if overdue≥2 OR in48h≥3 OR high-priority≥4 OR today's session load>4h. Score=overdue×20+in48h×15+high×10+overload×15.`};
    }
    if(intent==='DEADLINES'){
      const pending=tasks.filter(t=>t.status!=='done'&&t.deadline);
      if(!pending.length)return{content:`No tasks with deadlines. Add deadlines on the Tasks page.`,intent,xai:null};
      const sorted=pending.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
      let out=`## Upcoming Deadlines\n\n`;
      sorted.slice(0,8).forEach(t=>{
        const d=dl(t.deadline);
        const em=d<0?'🔴':d===0?'🟠':d<=2?'🟡':'🟢';
        const wh=d<0?`${Math.abs(d)}d overdue`:d===0?'TODAY':d===1?'tomorrow':`in ${d} days`;
        const sess=sessions.filter(s=>s.taskId===t.id&&s.status!=='done').length;
        out+=`${em} **${t.title}** — ${wh}\n${fd(t.deadline)}${t.course?' · '+t.course:''}${sess>0?` · ${sess} sessions left`:''}${t.estimatedTime?` · ${t.estimatedTime}h total`:''}\n\n`;
      });
      return{content:out,intent,xai:null};
    }
    if(intent==='TASK_STATUS'){
      const total=tasks.length,done=tasks.filter(t=>t.status==='done').length;
      const pending=tasks.filter(t=>t.status!=='done').length;
      const ov=tasks.filter(t=>t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='done').length;
      const rate=total?Math.round(done/total*100):0;
      const totalSess=sessions.length,doneSess=sessions.filter(s=>s.status==='done').length;
      const st=detectStress(tasks,sessions);
      return{content:`## Task & Session Summary\n\n**Tasks:** ${total} total · ${done} done (${rate}%) · ${pending} pending · ${ov} overdue\n**Sessions:** ${totalSess} total · ${doneSess} done · ${totalSess-doneSess} remaining\n**Stress:** ${st.isHigh?'HIGH ⚠️':'Manageable ✅'} (${st.score}/100)\n\n${rate>=75?'🎉 Excellent progress!':rate>=40?'📈 Good — keep going.':'💪 Ask me to "prioritize my tasks" to get started.'}`,intent,xai:null};
    }
    if(intent==='MOTIVATION'){const tips=[`## Breaking Through\n\n**2-minute rule:** Start with just 2 minutes on the hardest task. Momentum builds naturally.\n\n**Check your sessions:** Open the Dashboard and find today's sessions. Pick the shortest one and start now.\n\nOnce started, stopping is harder than continuing.`,`## Regaining Focus\n\n**Environment:** Study in the same spot every session.\n\n**Phone:** Put it in another room. Every notification costs 20+ minutes of refocus.\n\n**Right now:** Open ARIA chat, type "Plan today" — seeing your actual sessions makes starting easier.`,`## Low Energy Fix\n\n- Drink water right now\n- 10 jumping jacks\n- Study 25min → step outside 5min\n\nLow energy is usually dehydration, not laziness.`];return{content:tips[Math.floor(Math.random()*tips.length)],intent,xai:null};}
    if(intent==='STUDY_TIPS')return{content:`## Evidence-Based Techniques\n\n**1. Spaced Repetition** — Review at 1d → 3d → 1w → 1mo intervals\n**2. Active Recall** — Test yourself, don't re-read\n**3. Feynman Technique** — Explain it simply; gaps reveal gaps\n**4. Pomodoro** — 25 min focus → 5 min break\n**5. Interleaving** — Mix subjects in one session\n\n*Survey (Lab 3, n=54): 78% want smart reminders to use these.*`,intent,xai:null};
    if(intent==='POMODORO'){const ts=sessions.filter(s=>s.date===new Date().toISOString().split('T')[0]&&s.status!=='done').slice(0,3);let out=`## Pomodoro Session 🍅\n\n25 min focus → 5 min break. After 4 rounds: 30 min break.\n\n`;if(ts.length){out+=`**Your sessions for today:**\n`;ts.forEach((s,i)=>out+=`🍅 Round ${i+1}: ${s.taskTitle} (${s.duration}h)\n`);}else out+=`No sessions today. Ask: "Plan today" first.`;return{content:out,intent,xai:null};}
    if(intent==='TIME_ESTIMATE'){const pending=tasks.filter(t=>t.status!=='done');const withE=pending.filter(t=>t.estimatedTime);const total=withE.reduce((a,t)=>a+(parseFloat(t.estimatedTime)||0),0);const sessH=sessions.filter(s=>s.status!=='done').reduce((a,s)=>a+(s.duration||0),0);return{content:`## Time Analysis\n\n- **Tasks with estimates:** ${withE.length}/${pending.length}\n- **Total estimated hours:** ${total.toFixed(1)}h\n- **Remaining in sessions (DB):** ${sessH.toFixed(1)}h\n\n${total>40?'⚠️ Heavy load — consider rescheduling.':total>20?`📊 ${Math.ceil(total/5)}h per day needed.`:'✅ Achievable — ask "Plan this week" to distribute.'}`,intent,xai:null};}
    if(intent==='TIPS_EXAM')return{content:`## Exam Prep Strategy\n\n**1 Week Before:** Summary sheet · Practice problems · Identify weak areas\n**Night Before:** Review 30min max · Prepare materials · Sleep 7–8h\n**Day Of:** Eat breakfast · Arrive early · Read all questions first\n\n*Ask: "Plan today" for a focused exam-prep schedule using your DB sessions.*`,intent,xai:null};
    return null;
  }
  return{scoreTask,detectStress,classify,handle,greet};
})();

async function callGroq(msgs,tasks,name){
  const key=S.user.groqKey;if(!key)throw new Error('NO_KEY');
  const today=new Date().toISOString().split('T')[0];
  const ctx=tasks.filter(t=>t.status!=='done').slice(0,8).map(t=>`- ${t.title} (${t.priority}, due:${t.deadline||'none'}, est:${t.estimatedTime||'?'}h)`).join('\n');
  const sessCtx=S.sessions.filter(s=>s.date===today).map(s=>`- ${s.taskTitle}: ${s.duration}h (${s.status})`).join('\n');
  const sys=`You are ARIA, an academic AI assistant for KBTU students. Helpful, concise, warm. Use markdown. Under 250 words.\nStudent: ${name}\nTasks:\n${ctx||'None'}\nToday's sessions:\n${sessCtx||'None'}`;
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'llama-3.1-8b-instant',max_tokens:600,messages:[{role:'system',content:sys},...msgs.slice(-10).map(m=>({role:m.role,content:m.content}))]})});
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'Groq error');}
  const data=await res.json();return data.choices?.[0]?.message?.content||'No response.';
}

${upcoming.map(t=>{
  const d=dl(t.deadline);
  const tSess=sessions.filter(s=>s.taskId===t.id&&s.status!=='done');
  const dSess=sessions.filter(s=>s.taskId===t.id&&s.status==='done').length;
  const allSess=sessions.filter(s=>s.taskId===t.id).length;
  const sessProgress=allSess?Math.round(dSess/allSess*100):0;
  return`<div class="card" style="border-top:2px solid ${t.priority==='high'?'var(--red)':t.priority==='medium'?'var(--amber)':'var(--green)'}">
  <div class="fbb" style="margin-bottom:6px">
    <span style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(t.title)}</span>
    <span class="badge ${pc(t.priority)}" style="flex-shrink:0;margin-left:8px">${pl(t.priority)}</span>
  </div>
  ${t.course?`<div style="font-size:12px;color:var(--mut);margin-bottom:6px">📚 ${esc(t.course)}</div>`:''}
  <div style="font-size:12px;color:${d!==null&&d<0?'var(--red)':d!==null&&d<=2?'var(--amber)':'var(--mut)'};margin-bottom:8px">
    ${d===null?'No deadline':d<0?`⚠️ ${Math.abs(d)}d overdue`:d===0?'🔴 Due today':d===1?'🟠 Due tomorrow':`🟡 ${d} days left`}
  </div>
  ${allSess?`<div style="margin-bottom:4px"><div class="fbb" style="margin-bottom:3px"><span style="font-size:11px;color:var(--mut)">${dSess}/${allSess} sessions done</span><span style="font-size:11px;color:var(--green)">${sessProgress}%</span></div><div class="pb"><div class="pf" style="width:${sessProgress}%;background:var(--green)"></div></div></div>`:
  t.estimatedTime?`<div style="font-size:12px;color:var(--mut)">${ico('clock',11,'var(--mut)')} ${t.estimatedTime}h · <span style="color:var(--amber)">Set deadline to auto-schedule</span></div>`:`<div style="font-size:12px;color:var(--mut)">No time estimate set</div>`}
</div>`;}).join('')}
</div>`;}

// ═══════════════════════════════════════════════════
//  TASKS PAGE
// ═══════════════════════════════════════════════════
function renderTasks(){
  const{taskFilter:f,taskSort:s}=S;
  let tasks=[...S.tasks];
  if(f==='active')tasks=tasks.filter(t=>t.status!=='done');
  else if(f==='done')tasks=tasks.filter(t=>t.status==='done');
  else if(f==='high')tasks=tasks.filter(t=>t.priority==='high'&&t.status!=='done');
  else if(f==='overdue')tasks=tasks.filter(t=>t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='done');
  if(s==='score')tasks.sort((a,b)=>ARIA.scoreTask(b)-ARIA.scoreTask(a));
  else if(s==='deadline')tasks.sort((a,b)=>new Date(a.deadline||'9999')-new Date(b.deadline||'9999'));
  else if(s==='priority')tasks.sort((a,b)=>({high:0,medium:1,low:2}[a.priority]||2)-({high:0,medium:1,low:2}[b.priority]||2));
  else tasks.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const all=S.tasks;
  const cnt={high:all.filter(t=>t.priority==='high'&&t.status!=='done').length,medium:all.filter(t=>t.priority==='medium'&&t.status!=='done').length,low:all.filter(t=>t.priority==='low'&&t.status!=='done').length};
  return`<div class="fbb mb-24">
  <div><h1>My Tasks</h1><p style="color:var(--mut);font-size:14px;margin-top:4px">${all.filter(t=>t.status!=='done').length} pending · ${all.filter(t=>t.status==='done').length} completed</p></div>
  <div class="fb" style="gap:8px"><button class="btn btn-g sm" id="qprio">${ico('zap',14,'var(--green)')} ARIA Prioritize</button><button class="btn btn-p sm" id="atb">${ico('plus',15,'#fff')} New Task</button></div>
</div>
<div style="background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:center">
  <div class="aa" style="flex-shrink:0">AR</div>
  <p style="font-size:13px;color:var(--mut)"><strong style="color:var(--green)">Smart Session Splitting:</strong> Add a task with a <strong>deadline</strong> and <strong>estimated hours</strong> — ARIA automatically creates daily sessions in the database. Example: 6h task, 6 days = <strong>1h/day</strong>.</p>
</div>
<div class="g3" style="margin-bottom:16px">
${[{k:'high',l:'High',c:'var(--red)'},{k:'medium',l:'Medium',c:'var(--amber)'},{k:'low',l:'Low',c:'var(--green)'}].map(p=>`<div style="background:var(--s2);border:1px solid ${p.c}33;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px"><div style="width:10px;height:10px;border-radius:99px;background:${p.c}"></div><span style="font-size:13px;color:var(--mut)">${p.l} Priority</span><span style="font-size:22px;font-weight:800;color:${p.c};margin-left:auto">${cnt[p.k]}</span></div>`).join('')}
</div>
<div class="fb" style="gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
${[['all','All'],['active','Active'],['done','Done'],['high','High Priority'],['overdue','Overdue']].map(([v,l])=>`<button style="padding:5px 13px;border-radius:99px;border:1px solid ${f===v?'var(--acc)':'var(--border)'};background:${f===v?'rgba(56,189,248,.1)':'transparent'};color:${f===v?'var(--acc)':'var(--mut)'};cursor:pointer;font-size:13px;font-family:inherit" data-fl="${v}">${l}</button>`).join('')}
<div class="fb" style="margin-left:auto;gap:8px;align-items:center"><span style="font-size:13px;color:var(--mut)">Sort:</span>
<select class="inp" style="width:140px;padding:5px 10px;font-size:13px" id="tsrt">
<option value="score"${s==='score'?' selected':''}>ARIA Score</option>
<option value="deadline"${s==='deadline'?' selected':''}>Deadline</option>
<option value="priority"${s==='priority'?' selected':''}>Priority</option>
<option value="created"${s==='created'?' selected':''}>Created</option>
</select></div>
</div>
${!tasks.length?`<div class="card" style="text-align:center;padding:44px;color:var(--mut)">${ico('tasks',40,'var(--border)')}<br><br>No tasks in this view</div>`:''}
${tasks.map(t=>{
  const d=dl(t.deadline);
  const score=ARIA.scoreTask(t);
  const ov=t.deadline&&new Date(t.deadline)<new Date()&&t.status!=='done';
  const tSess=S.sessions.filter(s=>s.taskId===t.id);
  const doneSess=tSess.filter(s=>s.status==='done').length;
  const allSess=tSess.length;
  const sessDesc=SessionGen.describe(t);
  const isExp=S.expandedTask===t.id;
  return`<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden">
  <div style="display:flex;align-items:center;gap:12px;padding:14px 16px">
    <button class="tck" data-id="${t.id}" style="width:22px;height:22px;border-radius:6px;border:2px solid ${t.status==='done'?'var(--green)':'var(--border)'};background:${t.status==='done'?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">${t.status==='done'?ico('check',13,'#fff'):''}</button>
    <div style="flex:1;overflow:hidden;min-width:0">
      <div class="fb" style="gap:8px;flex-wrap:wrap;margin-bottom:3px">
        <span style="font-size:14px;font-weight:500;text-decoration:${t.status==='done'?'line-through':'none'}">${esc(t.title)}</span>
        <span class="badge ${pc(t.priority)}">${pl(t.priority)}</span>
        ${ov?'<span class="badge bh">Overdue</span>':''}
        ${t.status==='in_progress'?'<span class="badge bi">In Progress</span>':''}
        ${allSess?`<span class="gen-badge">${ico('split',10,'var(--green)')} ${allSess} sessions</span>`:''}
      </div>
      <div class="fb" style="gap:12px;font-size:12px;color:var(--mut);flex-wrap:wrap">
        ${t.course?`<span>📚 ${esc(t.course)}</span>`:''}
        ${t.deadline?`<span>📅 ${fd(t.deadline)}${d!==null?' ('+( d<0?Math.abs(d)+'d ago':d===0?'today':d===1?'tomorrow':d+'d')+')':''}</span>`:''}
        ${t.estimatedTime?`<span>⏱ ${esc(t.estimatedTime)}h total</span>`:''}
        ${sessDesc?`<span style="color:var(--green)">→ ${sessDesc.hpd}h/day × ${sessDesc.daysToUse}d</span>`:''}
        <span style="color:${score>75?'var(--red)':score>50?'var(--amber)':'var(--mut)'}">Score: ${score}/100</span>
      </div>
      ${allSess?`<div style="margin-top:6px"><div class="fbb" style="margin-bottom:3px"><span style="font-size:11px;color:var(--mut)">${doneSess}/${allSess} sessions done</span><span style="font-size:11px;color:var(--green)">${allSess?Math.round(doneSess/allSess*100):0}%</span></div><div class="pb"><div class="pf" style="width:${allSess?doneSess/allSess*100:0}%;background:var(--green)"></div></div></div>`:''}
    </div>
    <div class="fb" style="gap:6px;flex-shrink:0">
      ${allSess?`<button class="btn btn-g xs texp" data-id="${t.id}" title="${isExp?'Hide':'Show'} sessions">${ico(isExp?'chevron_up':'chevron_down',13)}</button>`:''}
      <button class="btn btn-g xs ted" data-id="${t.id}">${ico('edit',13)}</button>
      <button class="btn btn-d xs tdl" data-id="${t.id}">${ico('trash',13)}</button>
    </div>
  </div>
  ${isExp&&allSess?`<div style="border-top:1px solid var(--border);padding:12px 16px;background:var(--s1)">
    <div class="fbb" style="margin-bottom:10px"><span style="font-size:13px;font-weight:600;color:var(--green)">📅 Study Sessions (auto-generated)</span><button class="btn btn-gr xs" id="regen-${t.id}">↺ Regenerate</button></div>
    ${tSess.map(s=>`<div class="sess-row">
      <button class="sess-check${s.status==='done'?' done':''} sess-tog" data-sess="${s.id}" style="flex-shrink:0;width:18px;height:18px;border-radius:4px;border:2px solid ${s.status==='done'?'var(--green)':'var(--border)'};background:${s.status==='done'?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer">${s.status==='done'?ico('check',10,'#fff'):''}</button>
      <span style="font-size:12px;color:var(--mut);min-width:80px">${s.date}</span>
      <span style="font-size:12px">Day ${s.dayNum}/${s.totalDays}</span>
      <div class="sess-bar"><div class="sess-fill" style="width:${s.duration/((parseFloat(t.estimatedTime)||1)/tSess.length)*100}%;background:${s.status==='done'?'var(--green)':'var(--acc)'}"></div></div>
      <span style="font-size:13px;font-weight:600;color:${s.status==='done'?'var(--green)':'var(--acc)'};min-width:32px;text-align:right">${s.duration}h</span>
      <span style="font-size:10px;color:var(--mut);min-width:48px;text-align:right">${s.status==='done'?'✓ done':'pending'}</span>
    </div>`).join('')}
  </div>`:''}
</div>`;}). join('')}`;}

// ═══════════════════════════════════════════════════
//  SESSIONS PAGE — All sessions grouped by task
// ═══════════════════════════════════════════════════
function renderSessions(){
  const today=new Date().toISOString().split('T')[0];
  const allSess=S.sessions;
  const todaySess=allSess.filter(s=>s.date===today);
  const upcomingSess=allSess.filter(s=>s.date>today&&s.status!=='done').sort((a,b)=>a.date.localeCompare(b.date));
  const doneSess=allSess.filter(s=>s.status==='done');
  const pendingToday=todaySess.filter(s=>s.status!=='done');
  const doneToday=todaySess.filter(s=>s.status==='done');
  const todayH=todaySess.reduce((a,s)=>a+(s.duration||0),0);
  const doneH=doneToday.reduce((a,s)=>a+(s.duration||0),0);
  // Group upcoming by date
  const byDate={};
  upcomingSess.forEach(s=>{if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  return`<div class="fbb mb-24">
  <div><h1>Study Sessions</h1><p style="color:var(--mut);font-size:14px;margin-top:2px">Auto-generated from tasks · Stored in IndexedDB</p></div>
  <div class="fb" style="gap:8px"><button class="btn btn-g sm" data-nav="tasks">${ico('plus',14)} New Task</button></div>
</div>


<div class="fbb" style="margin-bottom:12px">
  <h2 style="margin:0;font-size:17px">Today — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</h2>
  <span style="font-size:13px;color:var(--mut)">${doneH.toFixed(1)} / ${todayH.toFixed(1)}h complete</span>
</div>
${!todaySess.length?`<div class="card" style="margin-bottom:20px;text-align:center;padding:28px;color:var(--mut)">No sessions for today. <button class="btn btn-p xs" style="margin-left:8px" data-nav="tasks">Add a task with hours + deadline →</button></div>`:`
<div style="margin-bottom:20px">
  <div class="pb" style="margin-bottom:12px"><div class="pf" style="width:${todayH?doneH/todayH*100:0}%;background:var(--green)"></div></div>
  ${todaySess.map(s=>`
  <div class="today-sess-item${s.status==='done'?' done-item':''}" style="margin-bottom:8px">
    <button class="sess-tog" data-sess="${s.id}" style="width:24px;height:24px;border-radius:7px;border:2px solid ${s.status==='done'?'var(--green)':'var(--border)'};background:${s.status==='done'?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">${s.status==='done'?ico('check',13,'#fff'):''}</button>
    <div style="flex:1;overflow:hidden">
      <div style="font-size:14px;font-weight:500;text-decoration:${s.status==='done'?'line-through':'none'}">${esc(s.taskTitle)}</div>
      <div style="font-size:12px;color:var(--mut)">Session ${s.dayNum}/${s.totalDays}${s.taskCourse?' · '+esc(s.taskCourse):''}</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-size:18px;font-weight:800;color:${s.status==='done'?'var(--green)':'var(--acc)'}">${s.duration}h</div>
      <div style="font-size:11px;color:var(--mut)">${s.status==='done'?'✓ done':'pending'}</div>
    </div>
  </div>`).join('')}
</div>`}


<div class="fbb" style="margin-bottom:12px"><h2 style="margin:0;font-size:17px">Upcoming Sessions</h2><span style="font-size:13px;color:var(--mut)">${upcomingSess.length} remaining</span></div>
${!Object.keys(byDate).length?`<div class="card" style="text-align:center;padding:24px;color:var(--mut)">No upcoming sessions. Sessions appear here after you add tasks with deadlines and estimated hours.</div>`:''}
${Object.entries(byDate).slice(0,7).map(([date,sess])=>{
  const dObj=new Date(date);const dayName=dObj.toLocaleDateString('en-US',{weekday:'short'});
  const totalH=sess.reduce((a,s)=>a+(s.duration||0),0);
  return`<div style="margin-bottom:12px">
  <div class="fbb" style="margin-bottom:6px"><span style="font-size:13px;font-weight:600">${dayName}, ${fd(date)}</span><span style="font-size:13px;color:var(--mut)">${totalH}h total</span></div>
  ${sess.map(s=>`<div class="sess-row">
    <div style="width:8px;height:8px;border-radius:99px;background:var(--acc);flex-shrink:0"></div>
    <div style="flex:1"><div style="font-size:13px;font-weight:500">${esc(s.taskTitle)}</div><div style="font-size:11px;color:var(--mut)">${s.taskCourse?' '+esc(s.taskCourse)+' ·':''} Session ${s.dayNum}/${s.totalDays}</div></div>
    <span style="font-size:14px;font-weight:700;color:var(--acc)">${s.duration}h</span>
  </div>`).join('')}
  </div>`;}).join('')}


${doneSess.length?`<div class="fbb" style="margin-bottom:12px;margin-top:20px"><h2 style="margin:0;font-size:17px">Completed Sessions</h2><span style="font-size:13px;color:var(--green)">${doneSess.length} done · ${doneSess.reduce((a,s)=>a+(s.duration||0),0).toFixed(1)}h total</span></div>
${doneSess.slice(-8).reverse().map(s=>`<div class="sess-row" style="opacity:.6">
  <div style="width:8px;height:8px;border-radius:99px;background:var(--green);flex-shrink:0"></div>
  <div style="flex:1"><div style="font-size:13px;font-weight:500;text-decoration:line-through">${esc(s.taskTitle)}</div><div style="font-size:11px;color:var(--mut)">${fd(s.date)} · Session ${s.dayNum}/${s.totalDays}</div></div>
  <span style="font-size:14px;font-weight:700;color:var(--green)">${s.duration}h ✓</span>
</div>`).join('')}`:''}
`;}
// ═══════════════════════════════════════════════════
//  CHAT, SCHEDULE, STRESS, ANALYTICS, PROFILE
// ═══════════════════════════════════════════════════

  <div class="fb" style="gap:8px"><button class="btn btn-g sm" id="sgk">${ico('settings',14)} ${hg?'Groq Key':'Add Groq (Free)'}</button><button class="btn btn-g sm" id="clr">${ico('trash',14)} Clear</button></div>
</div>
<div style="padding:10px 14px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:8px;margin-bottom:12px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
  <div class="aa" style="flex-shrink:0">AR</div>

</div>
<div style="display:flex;flex-direction:column;height:calc(100vh - 200px)">

${S.msgs.map(m=>`<div class="${m.role==='user'?'mu':'ma'}">

<div>${md(m.content)}</div>
${m.xai?`<div class="xb"><strong>${ico('info',11,'var(--green)')} XAI</strong>${md(m.xai)}</div>`:''}

${S.loading?`<div class="ma"><div class="mah"><div class="aa">AR</div><span style="font-size:12px;font-weight:700;color:var(--green)">ARIA</span><span style="font-size:11px;color:var(--mut)">thinking...</span></div><div style="display:flex;gap:5px;margin-top:4px"><span class="td" style="animation-delay:0s"></span><span class="td" style="animation-delay:.25s"></span><span class="td" style="animation-delay:.5s"></span></div></div>`:''}
</div>
<div class="fb" style="gap:8px;margin-bottom:8px;flex-wrap:wrap">
${qp.map(p=>`<button class="chip qp" data-p="${esc(p)}">${p}</button>`).join('')}
</div>
<div style="display:flex;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;align-items:center">
<input style="flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:14px;font-family:inherit" id="ci" placeholder="Ask ARIA about your sessions, tasks, or studies..." ${S.loading?'disabled':''}>
<button id="cs" style="width:34px;height:34px;border-radius:8px;border:none;background:${S.loading?'var(--s3)':'linear-gradient(135deg,#34d399,#38bdf8)'};display:flex;align-items:center;justify-content:center;cursor:${S.loading?'not-allowed':'pointer'};flex-shrink:0">
${S.loading?`<div style="width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:99px" class="spin"></div>`:ico('send',15,'#fff')}
</button></div></div>`;}

function renderSchedule(){
  const now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-now.getDay()+S.weekOff*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
  const tc={study:'#38bdf8',exam:'#f87171',assignment:'#fbbf24',break:'#34d399',lecture:'#a78bfa',session:'#34d399',other:'#64748b'};
  function evDay(d){
    const ds=d.toISOString().split('T')[0];
    const evs=S.events.filter(e=>e.date===ds);
    const taskEvs=S.tasks.filter(t=>t.deadline===ds&&t.status!=='done').map(t=>({id:'td_'+t.id,title:'📅 '+t.title,time:'23:59',type:'assignment',isTask:true,isDeadline:true}));
    const sessEvs=S.sessions.filter(s=>s.date===ds&&s.status!=='done').map(s=>({id:'se_'+s.id,title:s.taskTitle,time:'09:00',type:'session',isSess:true,duration:s.duration,sessId:s.id,sessStatus:s.status}));
    return[...evs,...sessEvs,...taskEvs].sort((a,b)=>a.time.localeCompare(b.time));
  }

<div class="g2"><div class="fg"><label>Duration (min)</label><input class="inp" id="edu" type="number" value="60" min="15" step="15"></div><div class="fg"><label>Type</label><select class="inp" id="ety"><option value="study">Study Session</option><option value="lecture">Lecture</option><option value="exam">Exam</option><option value="assignment">Assignment</option><option value="break">Break</option><option value="other">Other</option></select></div></div>
<div class="fb" style="gap:8px;justify-content:flex-end;margin-top:8px"><button class="btn btn-g mc">Cancel</button><button class="btn btn-p" id="sve">Add Event</button></div>`;}
function mGroq(){
  return`<div class="fbb" style="margin-bottom:16px"><h2 style="margin:0">Groq API Key</h2><button class="btn btn-g xs mc">${ico('x',16)}</button></div>
<div style="padding:12px 14px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:8px;margin-bottom:16px"><strong style="color:var(--green);display:block;margin-bottom:4px">ARIA works without this</strong><p style="font-size:13px;color:var(--mut);line-height:1.6">For open-ended questions via Llama-3. Free at <a href="https://console.groq.com" target="_blank" style="color:var(--acc)">console.groq.com</a>.</p></div>
<div class="fg"><label>Groq API Key</label><input class="inp" id="gki" type="password" placeholder="gsk_..." value="${esc(S.user.groqKey||'')}"></div>
<div class="fb" style="gap:8px;justify-content:flex-end"><button class="btn btn-g mc">Cancel</button><button class="btn btn-p" id="sgks">Save Key</button></div>`;}
function mDel(){
  return`<div class="fbb" style="margin-bottom:16px"><h2 style="margin:0;color:var(--red)">Delete All Data</h2><button class="btn btn-g xs mc">${ico('x',16)}</button></div>
<p style="font-size:13px;color:var(--mut);margin-bottom:16px;line-height:1.6">Permanently deletes all tasks, sessions, events, and chat history from IndexedDB. <strong>Cannot be undone.</strong></p>
<div class="fb" style="gap:8px;justify-content:flex-end"><button class="btn btn-g mc">Cancel</button><button class="btn btn-d" id="cda">Yes, Delete Everything</button></div>`;}

// ═══════════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════════
function aLanding(){
  document.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>{S.page=b.dataset.go;render();}));
}
function aAuth(){
  const sub=document.getElementById('asub');
  const err=msg=>{const e=document.getElementById('aerr');if(e){e.textContent=msg;e.style.display='block';}};
  sub?.addEventListener('click',async()=>{
    const isR=S.page==='register';
    const name=isR?document.getElementById('an')?.value.trim():null;
    const email=document.getElementById('ae')?.value.trim();
    const pw=document.getElementById('ap')?.value;
    if(isR&&!name){err('Name is required');return;}
    if(!email){err('Email is required');return;}
    if(!pw||pw.length<4){err('Password must be at least 4 characters');return;}
    try{
      if(isR){
        const existing=Users.find(email);
        if(existing){err('Email already registered');return;}
        const user={id:uid2(),name,email,passwordHash:await Auth.hashPassword(pw),groqKey:'',preferences:{notifications:true},createdAt:Date.now()};
        Users.save(user);S.user=user;
        await loadData();S.page='dashboard';render();
      }else{
        const user=Users.find(email);
        const authed=await Auth.authenticate(user,pw);
        if(!authed){err('Invalid email or password');return;}
        Users.save(authed);S.user=authed;
        await loadData();S.page='dashboard';render();
      }
    }catch(e){err(e.message||'Authentication failed');}
  });
  document.getElementById('asw')?.addEventListener('click',()=>{S.page=S.page==='login'?'register':'login';render();});
  document.querySelectorAll('[data-go="landing"]').forEach(b=>b.addEventListener('click',()=>{S.page='landing';render();}));
  ['ae','ap','an'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')sub?.click();}));
}
function aLayout(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{S.page=b.dataset.nav;render();}));
  document.getElementById('lout')?.addEventListener('click',()=>{
    Users.clearCurrent();S.user=null;S.tasks=[];S.sessions=[];S.events=[];S.msgs=[];S.page='landing';render();
  });
}
function aPage(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{S.page=b.dataset.nav;render();}));
  const p=S.page;
  if(p==='dashboard')aDash();
  else if(p==='tasks')aTasks();
  else if(p==='sessions')aSessions();
  else if(p==='chat')aChat();
  else if(p==='schedule')aSched();
  else if(p==='stress')aStress();
  else if(p==='profile')aProfile();
}
function aDash(){
  // Session checkboxes on dashboard
  document.querySelectorAll('.sess-check[data-sess]').forEach(b=>b.addEventListener('click',async()=>{
    await toggleSession(b.dataset.sess);
  }));
}
function aTasks(){
  document.getElementById('atb')?.addEventListener('click',()=>{S.modal={type:'task',data:null};renderModal();});
  document.getElementById('qprio')?.addEventListener('click',()=>{S.page='chat';render();setTimeout(()=>{const i=document.getElementById('ci');if(i){i.value='Prioritize my tasks';document.getElementById('cs')?.click();}},300);});
  document.querySelectorAll('[data-fl]').forEach(b=>b.addEventListener('click',()=>{S.taskFilter=b.dataset.fl;render();}));
  document.getElementById('tsrt')?.addEventListener('change',e=>{S.taskSort=e.target.value;render();});
  document.querySelectorAll('.tck').forEach(b=>b.addEventListener('click',async()=>{
    const t=S.tasks.find(x=>x.id===b.dataset.id);
    if(!t)return;
    const newStatus=t.status==='done'?'todo':'done';
    const updated={...t,status:newStatus};
    await saveTask(updated);
  }));
  document.querySelectorAll('.ted').forEach(b=>b.addEventListener('click',()=>{
    const t=S.tasks.find(x=>x.id===b.dataset.id);
    if(t){S.modal={type:'task',data:{...t}};renderModal();}
  }));
  document.querySelectorAll('.tdl').forEach(b=>b.addEventListener('click',async()=>{
    await deleteTask(b.dataset.id);render();
  }));
  document.querySelectorAll('.texp').forEach(b=>b.addEventListener('click',()=>{
    S.expandedTask=S.expandedTask===b.dataset.id?null:b.dataset.id;render();
  }));
  document.querySelectorAll('.sess-tog').forEach(b=>b.addEventListener('click',async()=>{
    await toggleSession(b.dataset.sess);
  }));
  document.querySelectorAll('[id^="regen-"]').forEach(btn=>{
    const tid=btn.id.replace('regen-','');
    btn.addEventListener('click',async()=>{
      const t=S.tasks.find(x=>x.id===tid);
      if(t){await saveTask(t);render();}
    });
  });
}
function aSessions(){
  document.querySelectorAll('.sess-tog').forEach(b=>b.addEventListener('click',async()=>{
    await toggleSession(b.dataset.sess);
  }));
}
function aChat(){
  const inp=document.getElementById('ci'),snd=document.getElementById('cs');
  document.getElementById('sgk')?.addEventListener('click',()=>{S.modal={type:'groq'};renderModal();});
  document.getElementById('clr')?.addEventListener('click',async()=>{
    await DB.clearMsgs(S.user.id);
    const m={id:uid2(),role:'assistant',intent:'GREETING',content:ARIA.greet(S.user.name,S.tasks,S.sessions),userId:S.user.id,ts:Date.now()};
    await DB.saveMsg(m);S.msgs=[m];render();scrl();
  });
  document.querySelectorAll('.qp').forEach(b=>b.addEventListener('click',()=>{if(inp)inp.value=b.dataset.p;inp?.focus();}));
  const send=async()=>{
    const text=inp?.value.trim();
    if(!text||S.loading)return;
    const um={id:uid2(),role:'user',content:text,userId:S.user.id,ts:Date.now()};
    await DB.saveMsg(um);S.msgs.push(um);
    if(inp)inp.value='';
    S.loading=true;render();scrl();
    await new Promise(r=>setTimeout(r,320));
    try{
      const intent=ARIA.classify(text);
      if(intent!=='FALLBACK'){
        const res=ARIA.handle(intent,text,S.tasks,S.sessions,S.user.name);
        if(res){
          const am={id:uid2(),role:'assistant',intent,content:res.content,xai:res.xai,userId:S.user.id,ts:Date.now()};
          await DB.saveMsg(am);S.msgs.push(am);
          S.loading=false;render();scrl();return;
        }
      }
      if(S.user.groqKey){
        try{
          const resp=await callGroq(S.msgs.filter(m=>m.role!=='system'),S.tasks,S.user.name);
          const am={id:uid2(),role:'assistant',intent:'FALLBACK',content:resp,xai:null,userId:S.user.id,ts:Date.now()};
          await DB.saveMsg(am);S.msgs.push(am);
        }catch(e){
          const msg=e.message==='NO_KEY'?fallbackMsg():(`⚠️ Groq error: ${e.message}`);
          const am={id:uid2(),role:'assistant',intent:'FALLBACK',content:msg,xai:null,userId:S.user.id,ts:Date.now()};
          await DB.saveMsg(am);S.msgs.push(am);
        }
      }else{
        const am={id:uid2(),role:'assistant',intent:'FALLBACK',content:fallbackMsg(),xai:null,userId:S.user.id,ts:Date.now()};
        await DB.saveMsg(am);S.msgs.push(am);
      }
    }catch(e){
      const am={id:uid2(),role:'assistant',intent:'FALLBACK',content:`⚠️ Error: ${e.message}`,xai:null,userId:S.user.id,ts:Date.now()};
      await DB.saveMsg(am);S.msgs.push(am);
    }
    S.loading=false;render();scrl();
  };
  snd?.addEventListener('click',send);
  inp?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
  scrl();
}
function fallbackMsg(){
  return`I can help with these specific questions:\n\n- **"Plan today"** — shows your real scheduled sessions\n- **"Prioritize my tasks"** — ARIA scoring formula\n- **"Show my sessions"** — all study sessions from DB\n- **"Am I stressed?"** — Lab 4 classifier\n- **"Plan this week"** — sessions grouped by day\n- **"Study tips"**, **"Motivate me"**, **"Exam prep tips"**\n- **"Time estimate"** — hours analysis\n- **"What's due soon?"** — deadline overview\n\nFor open-ended questions, add a free **Groq key** in Settings → console.groq.com (2 minutes).`;
}
function scrl(){setTimeout(()=>{const e=document.getElementById('cmsg');if(e)e.scrollTop=e.scrollHeight;},60);}
function aSched(){
  document.getElementById('pw')?.addEventListener('click',()=>{S.weekOff--;render();});
  document.getElementById('nw')?.addEventListener('click',()=>{S.weekOff++;render();});
  document.getElementById('td')?.addEventListener('click',()=>{S.weekOff=0;render();});
  document.getElementById('aev')?.addEventListener('click',()=>{S.modal={type:'event'};renderModal();});
  document.querySelectorAll('[data-dev]').forEach(b=>b.addEventListener('click',async e=>{
    e.stopPropagation();await DB.deleteEvent(b.dataset.dev);
    S.events=S.events.filter(ev=>ev.id!==b.dataset.dev);render();
  }));
  // Session toggle from calendar
  document.querySelectorAll('[data-sess]').forEach(b=>b.addEventListener('click',async()=>{
    await toggleSession(b.dataset.sess);
  }));
}
function aStress(){
  const sd=document.getElementById('sd'),so=document.getElementById('so'),sh=document.getElementById('sh');
  sd?.addEventListener('input',()=>{document.getElementById('dv').textContent=sd.value;});
  so?.addEventListener('input',()=>{document.getElementById('ov').textContent=so.value;});
  sh?.addEventListener('input',()=>{document.getElementById('hv').textContent=parseFloat(sh.value).toFixed(1);});
  document.getElementById('rstr')?.addEventListener('click',()=>{
    const dl=parseInt(sd?.value||0),od=parseInt(so?.value||0),shv=parseFloat(sh?.value||0);
    S.stressRes={isHigh:od>=2||dl>=3||shv>4,score:Math.min(100,dl*15+od*20+(shv>4?15:0)),dl,od,sh:shv};render();
  });
}
function aProfile(){
  document.getElementById('svp')?.addEventListener('click',()=>{
    const n=document.getElementById('pfn')?.value.trim(),e=document.getElementById('pfe')?.value.trim();
    if(!n||!e)return;
    const updated={...S.user,name:n,email:e};Users.save(updated);S.user=updated;S.saved=true;render();setTimeout(()=>{S.saved=false;},3000);
  });
  document.getElementById('svg')?.addEventListener('click',()=>{
    const k=document.getElementById('pfg')?.value.trim();
    const updated={...S.user,groqKey:k};Users.save(updated);S.user=updated;S.saved=true;render();setTimeout(()=>{S.saved=false;},3000);
  });
  document.getElementById('deld')?.addEventListener('click',()=>{S.modal={type:'del'};renderModal();});
}
function aMod(type){
  document.querySelectorAll('.mc').forEach(b=>b.addEventListener('click',()=>{S.modal=null;document.querySelector('.mo')?.remove();}));
  if(type==='task'){
    // Live session preview
    const preview=()=>{
      const title=document.getElementById('mt')?.value.trim();
      const deadline=document.getElementById('md')?.value;
      const hours=document.getElementById('mh')?.value;
      const el=document.getElementById('sess-preview');
      if(!el)return;
      if(deadline&&hours&&parseFloat(hours)>0){
        const mock={id:'preview',userId:S.user?.id||'',title:title||'Task',deadline,estimatedTime:hours,priority:'medium',status:'todo',course:''};
        const desc=SessionGen.describe(mock);
        if(desc){
          const bars=Array.from({length:Math.min(desc.daysToUse,7)},(_,i)=>`<div class="fb" style="gap:6px;margin-bottom:3px"><span style="font-size:10px;color:var(--mut);min-width:40px">Day ${i+1}</span><div style="flex:1;height:5px;background:var(--s3);border-radius:99px;overflow:hidden"><div style="width:100%;height:100%;background:var(--green);border-radius:99px"></div></div><span style="font-size:10px;color:var(--green);font-weight:600">${desc.hpd}h</span></div>`).join('');
          el.innerHTML=`<div style="padding:10px 12px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:8px"><div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:8px">${ico('split',12,'var(--green)')} ARIA will generate ${desc.daysToUse} sessions:</div>${bars}${desc.daysToUse>7?`<div style="font-size:11px;color:var(--mut);margin-top:4px">...and ${desc.daysToUse-7} more sessions</div>`:''}<div style="font-size:11px;color:var(--mut);margin-top:6px">${desc.hpd}h/day × ${desc.daysToUse} days = ${desc.totalHours}h total</div></div>`;
        }else el.innerHTML='';
      }else el.innerHTML='';
    };
    ['mt','md','mh'].forEach(id=>document.getElementById(id)?.addEventListener('input',preview));
    preview();
    document.getElementById('svt')?.addEventListener('click',async function(){
      const title=document.getElementById('mt')?.value.trim();if(!title)return;
      const data={title,course:document.getElementById('mc')?.value.trim()||'',deadline:document.getElementById('md')?.value||'',priority:document.getElementById('mp')?.value||'medium',status:document.getElementById('ms')?.value||'todo',estimatedTime:document.getElementById('mh')?.value||'',notes:document.getElementById('mn')?.value.trim()||''};
      const existId=this.dataset.id;
      const task={...(existId?S.tasks.find(t=>t.id===existId)||{}:{}), ...data, id:existId||uid2(), userId:S.user.id, createdAt:existId?(S.tasks.find(t=>t.id===existId)?.createdAt||Date.now()):Date.now()};
      S.modal=null;document.querySelector('.mo')?.remove();
      await saveTask(task);render();
    });
  }else if(type==='event'){
    document.getElementById('sve')?.addEventListener('click',async()=>{
      const t=document.getElementById('et')?.value.trim(),d=document.getElementById('ed')?.value;
      if(!t||!d)return;
      const ev={id:uid2(),userId:S.user.id,title:t,date:d,time:document.getElementById('eti')?.value||'09:00',duration:parseInt(document.getElementById('edu')?.value)||60,type:document.getElementById('ety')?.value||'study',createdAt:Date.now()};
      await DB.saveEvent(ev);S.events.push(ev);
      S.modal=null;document.querySelector('.mo')?.remove();render();
    });
  }else if(type==='groq'){
    document.getElementById('sgks')?.addEventListener('click',()=>{
      const k=document.getElementById('gki')?.value.trim();if(!k)return;
      const updated={...S.user,groqKey:k};Users.save(updated);S.user=updated;
      S.modal=null;document.querySelector('.mo')?.remove();render();
    });
  }else if(type==='del'){
    document.getElementById('cda')?.addEventListener('click',async()=>{
      // Delete everything from IndexedDB for this user
      const uid=S.user.id;
      const [tasks,sessions,events,msgs]=await Promise.all([
        DB.getTasksByUser(uid),DB.getSessionsByUser(uid),DB.getEventsByUser(uid),DB.getMsgsByUser(uid)
      ]);
      await Promise.all([
        ...tasks.map(t=>DB.deleteTask(t.id)),
        ...sessions.map(s=>DB.deleteSession?DB.deleteSession(s.id):dbDel('sessions',s.id)),
        ...events.map(e=>DB.deleteEvent(e.id)),
        ...msgs.map(m=>dbDel('messages',m.id)),
      ]);
      S.tasks=[];S.sessions=[];S.events=[];S.msgs=[];
      S.modal=null;document.querySelector('.mo')?.remove();S.page='dashboard';render();
    });
  }
}
// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
(async()=>{
  S.user=await migrateStoredPasswords();
  S.page=S.user?'dashboard':'landing';
  if(S.user){
    await loadData();
  }
  render();
})();
</script></body></html>
